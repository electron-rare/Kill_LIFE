# Nginx reverse proxy for aperant.saillant.cc
# Install: sudo cp nginx-aperant.conf /etc/nginx/sites-available/aperant
#          sudo ln -sf /etc/nginx/sites-available/aperant /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d aperant.saillant.cc
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name aperant.saillant.cc;

    location / {
        proxy_pass http://127.0.0.1:5181;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # WebSocket terminal endpoint
    location /ws/ {
        proxy_pass http://127.0.0.1:5181;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}

name: Evidence Pack Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence_pack:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bootstrap repo-local venv
        run: bash tools/bootstrap_python_env.sh

      - name: Generate evidence pack summary
        run: ./.venv/bin/python tools/auto_check_ci_cd.py

      - name: Upload evidence pack artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-pack
          if-no-files-found: warn
          path: |
            docs/evidence/
